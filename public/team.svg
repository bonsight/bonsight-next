<svg viewBox="0 0 700 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A3D2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="windowLight" cx="100%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#9FE1CB" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#111110" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A27"/>
      <stop offset="100%" stop-color="#1A1A18"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A18"/>
      <stop offset="100%" stop-color="#111110"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="560" fill="#111110"/>

  <!-- Ambient window light from top-right -->
  <rect width="700" height="560" fill="url(#windowLight)"/>

  <!-- Subtle horizontal grid lines (floor reflection) -->
  <line x1="0" y1="430" x2="700" y2="430" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="490" x2="700" y2="490" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>

  <!-- Desk surface -->
  <rect x="0" y="348" width="700" height="18" fill="url(#deskGrad)" rx="1"/>
  <rect x="0" y="366" width="700" height="194" fill="url(#floorGrad)"/>

  <!-- Desk front edge highlight -->
  <line x1="0" y1="348" x2="700" y2="348" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ── LAPTOP ── centered -->
  <!-- Lid back face -->
  <rect x="242" y="192" width="216" height="158" rx="6" fill="#1E1E1C"/>
  <!-- Screen bezel -->
  <rect x="248" y="198" width="204" height="146" rx="4" fill="#0A0A09"/>
  <!-- Screen display area -->
  <rect x="254" y="204" width="192" height="134" rx="2" fill="#0A3D2E"/>
  <!-- Screen glow overlay -->
  <rect x="254" y="204" width="192" height="134" rx="2" fill="url(#screenGlow)"/>

  <!-- Dashboard content on screen -->
  <rect x="264" y="215" width="80" height="5" rx="1" fill="rgba(159,225,203,0.35)"/>
  <rect x="264" y="224" width="55" height="3" rx="1" fill="rgba(159,225,203,0.18)"/>
  <!-- Chart line on screen -->
  <polyline points="264,295 280,278 296,283 312,262 328,267 344,250 360,254" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <polyline points="264,295 280,278 296,283 312,262 328,267 344,250 360,254" stroke="#9FE1CB" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Metric cards on screen -->
  <rect x="370" y="215" width="62" height="34" rx="2" fill="rgba(15,110,86,0.5)"/>
  <rect x="374" y="219" width="28" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="374" y="228" width="40" height="7" rx="1" fill="rgba(255,255,255,0.7)"/>
  <rect x="370" y="255" width="62" height="34" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="374" y="259" width="28" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="374" y="268" width="36" height="7" rx="1" fill="rgba(255,255,255,0.45)"/>

  <!-- Laptop hinge -->
  <rect x="242" y="348" width="216" height="6" rx="2" fill="#252523"/>
  <!-- Laptop base/keyboard -->
  <rect x="228" y="350" width="244" height="14" rx="3" fill="#1E1E1C"/>
  <!-- Keyboard rows suggestion -->
  <rect x="242" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="252" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="262" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="272" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="282" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="292" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="302" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="312" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="322" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="332" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="342" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="352" y="354" width="6" height="3" rx="0.5" fill="rgba(255,255,255,0.06)"/>

  <!-- ── PERSON 1 (left, leaning in) ── -->
  <!-- Torso -->
  <rect x="76" y="212" width="92" height="138" rx="32" fill="#232321"/>
  <!-- Collar -->
  <path d="M108 212 L122 238 L136 212" fill="#1A1A18"/>
  <!-- Head -->
  <ellipse cx="122" cy="188" rx="30" ry="32" fill="#3A3835"/>
  <!-- Hair -->
  <path d="M92 184 Q104 158 122 162 Q140 158 152 184 Q152 168 122 162 Q92 168 92 184 Z" fill="#1C1C1A"/>
  <!-- Ear -->
  <ellipse cx="92" cy="192" rx="5" ry="7" fill="#3A3835"/>
  <!-- Arm on desk (right arm reaching to laptop) -->
  <path d="M158 290 Q190 320 240 338" stroke="#232321" stroke-width="26" stroke-linecap="round"/>
  <path d="M158 290 Q190 320 240 338" stroke="#2A2A27" stroke-width="12" stroke-linecap="round"/>
  <!-- Hand suggestion -->
  <ellipse cx="243" cy="340" rx="10" ry="7" fill="#3A3835" transform="rotate(-15 243 340)"/>

  <!-- ── PERSON 2 (right, standing/leaning, looking at screen) ── -->
  <!-- Torso -->
  <rect x="530" y="170" width="86" height="178" rx="28" fill="#1E1E1C"/>
  <!-- Collar -->
  <path d="M562 170 L573 194 L584 170" fill="#161614"/>
  <!-- Head -->
  <ellipse cx="573" cy="147" rx="28" ry="30" fill="#2E2C29"/>
  <!-- Hair (shorter) -->
  <path d="M545 143 Q555 122 573 126 Q591 122 601 143 Q601 130 573 126 Q545 130 545 143 Z" fill="#111110"/>
  <!-- Ear -->
  <ellipse cx="601" cy="150" rx="5" ry="7" fill="#2E2C29"/>
  <!-- Left arm pointing toward screen -->
  <path d="M540 250 Q500 300 460 338" stroke="#1E1E1C" stroke-width="22" stroke-linecap="round"/>
  <path d="M540 250 Q500 300 460 338" stroke="#252523" stroke-width="10" stroke-linecap="round"/>
  <!-- Hand -->
  <ellipse cx="457" cy="340" rx="10" ry="7" fill="#2E2C29" transform="rotate(20 457 340)"/>

  <!-- ── DESK OBJECTS ── -->
  <!-- Notebook/papers (left of laptop) -->
  <rect x="128" y="325" width="88" height="60" rx="2" fill="#F4F2EC" opacity="0.07"/>
  <rect x="130" y="327" width="84" height="56" rx="1" fill="#ECEAE2" opacity="0.04"/>
  <line x1="138" y1="340" x2="208" y2="340" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="138" y1="348" x2="200" y2="348" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="138" y1="356" x2="204" y2="356" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="138" y1="364" x2="196" y2="364" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Pen -->
  <rect x="222" y="334" width="3" height="44" rx="1" fill="rgba(255,255,255,0.12)" transform="rotate(-8 222 334)"/>

  <!-- Coffee mug (right of laptop) -->
  <rect x="492" y="316" width="30" height="36" rx="4" fill="#252523"/>
  <path d="M522 326 Q536 326 536 334 Q536 342 522 342" stroke="#252523" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Mug rim -->
  <rect x="492" y="314" width="30" height="6" rx="3" fill="#2A2A27"/>
  <!-- Coffee surface -->
  <ellipse cx="507" cy="317" rx="12" ry="3" fill="#1A1210" opacity="0.8"/>
  <!-- Steam -->
  <path d="M501 310 Q503 302 501 294" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M508 308 Q510 298 508 290" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M515 310 Q517 302 515 294" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small phone (far right) -->
  <rect x="566" y="326" width="22" height="36" rx="4" fill="#1C1C1A"/>
  <rect x="569" y="330" width="16" height="24" rx="1" fill="#0A3D2E" opacity="0.7"/>
  <rect x="569" y="330" width="16" height="24" rx="1" fill="url(#screenGlow)" opacity="0.5"/>

  <!-- Screen ambient glow on desk surface -->
  <ellipse cx="350" cy="355" rx="90" ry="12" fill="#0F6E56" opacity="0.06"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="700" height="2" fill="#0F6E56" opacity="0.5"/>

  <!-- Vignette overlay -->
  <rect width="700" height="560" fill="url(#vignette)" opacity="0.4"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#111110"/>
    </radialGradient>
  </defs>
</svg>
